<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title> AI Chatbot</title>
  <link rel="stylesheet" href="bot.css" />
</head>
<body>

<!-- Floating Chat Icon -->
<div id="chatbot-icon">
  <!-- SVG Icon -->
  <svg width="36" height="36" viewBox="0 0 24 24" fill="white">
    <path d="M12 2C6.48 2 2 6.02 2 11c0 2.38 1.05 4.54 2.78 6.13L4 22l4.21-2.11c1.16.32 2.43.49 3.79.49 5.52 0 10-4.02 10-9s-4.48-9-10-9z"/>
  </svg>
</div>

<!-- Chat Window -->
<div id="chatbot-container">
  <div id="chat-header">
    🧾 TaxBuddy AI
    <span id="close-btn">✖</span>
  </div>

  <div id="chat-messages"></div>

  <div id="chat-input">
    <input type="text" id="user-input" placeholder="Ask tax related questions..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="js/chatbot.js"></script>
</body>
</html>

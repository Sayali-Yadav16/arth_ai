<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TaxBuddy — Sign up</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

<div class="auth-card">

  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-logo">🌿 Tax Buddy</div>

    <div class="auth-illustration">
      <img src="assets/img.png" alt="Tax Illustration">
    </div>

    <div class="auth-tagline">
      Simplify Your Finances,<br> Secure Your Future
    </div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <h2>Create an account</h2>
    <p>Already have an account? <a href="login.html">Log in</a></p>

    <form class="auth-form" id="signup-form">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Create account</button>
    </form>
    <div id="error" style="margin-top:12px;color:#fca5a5;font-size:13px"></div>

  </div>

</div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:4000/api'
      : '/api';
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const resp = await fetch(`${API_BASE}/auth/signup`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ name, email, password })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Signup failed');
        localStorage.setItem('tb_token', data.token);
        localStorage.setItem('tb_user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('error').textContent = err.message;
      }
    });
  </script>
</body>
</html>
